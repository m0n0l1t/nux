name: FastAPI CI/CD with Docker

on:
  push:
    branches: [ main ]  # Запуск при пуше в ветку main
  pull_request:
    branches: [ main ]

jobs:
  # ЭТАП 1: Тестирование (CI)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx  # Утилиты для тестов

      - name: Run tests
        run: |
          # Если тестов пока нет, можно просто проверить синтаксис: 
          # python -m compileall .
          pytest

  # ЭТАП 2: Деплой на сервер (CD)
  deploy:
    runs-on: ubuntu-latest
    needs: test  # Деплой начнется только если тесты прошли успешно
    if: github.ref == 'refs/heads/main'  # Деплоим только из ветки main
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Переходим в папку проекта
            cd /var/www/gotelegram-site/nux
            
            # Подтягиваем последние изменения
            git pull origin main
            
            # Пересобираем и запускаем контейнеры
            # Используем "docker compose" (современный стандарт)
            docker compose up -d --build
            
            # Очистка старых ненужных образов, чтобы не забивать диск
            docker image prune -f
