name: FastAPI CI/CD with Docker

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4          # v3 → v4 (Node.js 24)

      - name: Set up Python
        uses: actions/setup-python@v5      # v4 → v5 (Node.js 24)
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3   # обновлено с v0.1.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/gotelegram-site
            cat > .env << 'EOF'
            ${{ secrets.ENV_FILE_CONTENT }}
            EOF
            git pull
            docker compose up -d --build
            docker image prune -f