name: FastAPI Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Переходим в папку проекта (создайте её заранее или добавьте git clone)
            cd /var/www/my-fastapi-app || git clone https://github.com{{ github.repository }} /var/www/my-fastapi-app
            cd /var/www/my-fastapi-app
            
            # 2. Обновляем код
            git pull origin main
            
            # 3. Пересобираем и запускаем (если используете Docker)
            docker-compose up -d --build
            
            # Или, если запускаете через venv и systemd (без Docker):
            # source .venv/bin/activate
            # pip install -r requirements.txt
            # sudo systemctl restart fastapi_app
